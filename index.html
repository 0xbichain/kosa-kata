<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kamus Cerdas 3 Huruf</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <link href="https://cdn.jsdelivr.net/npm/remixicon@3.5.0/fonts/remixicon.css" rel="stylesheet">
</head>

<body>
    <div class="background-shapes">
        <div class="shape shape-1"></div>
        <div class="shape shape-2"></div>
        <div class="shape shape-3"></div>
    </div>

    <main class="container">
        <header class="header">
            <div class="logo-container">
                <i class="ri-book-open-line"></i>
                <h1>Kamus Cerdas</h1>
            </div>
            <p class="subtitle">Cari kata berdasarkan 1 hingga 3 huruf awal secara real-time</p>
        </header>

        <section class="search-section">
            <div class="search-container">
                <div class="search-box">
                    <i class="ri-search-line search-icon"></i>
                    <input type="text" id="searchInput" placeholder="Awalan 1 - 3 huruf (wajib)..." maxlength="3"
                        autocomplete="off" autofocus>
                    <button class="clear-btn" id="clearBtn"><i class="ri-close-line"></i></button>
                </div>
                <div class="search-box">
                    <i class="ri-filter-3-line search-icon"></i>
                    <input type="text" id="suffixInput" placeholder="Akhiran (pisahkan dgn koma, opsional)..." 
                        autocomplete="off">
                    <button class="clear-btn" id="clearSuffixBtn"><i class="ri-close-line"></i></button>
                </div>
            </div>
        </section>

        <section class="results-section" id="resultsSection">
            <div class="state-container" id="initialState">
                <i class="ri-keyboard-line"></i>
                <p>Mulai mengetik untuk melihat kosakata</p>
            </div>

            <div class="state-container hidden" id="emptyState">
                <i class="ri-inbox-line"></i>
                <p>Tidak ada kata yang ditemukan untuk awalan ini.</p>
            </div>

            <div class="results-grid" id="resultsGrid">
                <!-- Hasil akan dimuat di sini -->
            </div>
        </section>
    </main>

    <script src="data.js"></script>
    <script src="script.js"></script>
</body>

</html>
